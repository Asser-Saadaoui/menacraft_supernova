<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthHover</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #0D0F14;
      color: #F0F2F7;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px; height: 32px;
      background: #00E5A0;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }

    .brand-name {
      font-size: 15px; font-weight: 700;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.04em;
    }

    .brand-name span { color: #00E5A0; }

    .body { padding: 16px 18px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00E5A0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-text {
      font-size: 13px;
      color: #00E5A0;
    }

    .info-box {
      background: #1E2330;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 14px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      padding: 4px 0;
    }

    .info-label { color: #6B7280; }
    .info-value { color: #F0F2F7; font-family: 'Courier New', monospace; }
    .info-value.green { color: #00E5A0; }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 8px 0;
    }

    .hint {
      font-size: 11px;
      color: #6B7280;
      line-height: 1.6;
      text-align: center;
    }

    .hint strong { color: #00E5A0; }

    .footer {
      padding: 10px 18px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      justify-content: space-between;
    }

    .footer-txt {
      font-size: 10px;
      color: #6B7280;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🔍</div>
    <div class="brand-name">Truth<span>Hover</span></div>
  </div>

  <div class="body">
    <div class="status-row">
      <div class="dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Extension active</span>
    </div>

    <div class="info-box">
      <div class="info-row">
        <span class="info-label">Backend</span>
        <span class="info-value" id="backendStatus">Vérification...</span>
      </div>
      <div class="divider"></div>
      <div class="info-row">
        <span class="info-label">URL API</span>
        <span class="info-value">localhost:3000</span>
      </div>
      <div class="info-row">
        <span class="info-label">Délai hover</span>
        <span class="info-value green">5 secondes</span>
      </div>
    </div>

    <p class="hint">
      Survolez un post pendant <strong>5 secondes</strong> pour analyser sa fiabilité en temps réel.
    </p>
  </div>

  <div class="footer">
    <span class="footer-txt">TruthHover v2.1.0</span>
    <span class="footer-txt">Anthropic · 2025</span>
  </div>

  <script>
    // Vérifier si le backend tourne
    const backendEl = document.getElementById('backendStatus');
    const dotEl = document.getElementById('statusDot');
    const statusEl = document.getElementById('statusText');

    fetch('http://localhost:3000/health', { method: 'GET', signal: AbortSignal.timeout(3000) })
      .then(r => {
        if (r.ok) {
          backendEl.textContent = '✓ En ligne';
          backendEl.style.color = '#00E5A0';
        } else {
          throw new Error('HTTP ' + r.status);
        }
      })
      .catch(() => {
        backendEl.textContent = '✗ Hors ligne';
        backendEl.style.color = '#FF4F6D';
        dotEl.style.background = '#FF4F6D';
        statusEl.textContent = 'Backend hors ligne';
        statusEl.style.color = '#FF4F6D';
      });
  </script>
</body>
</html>
